<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatbot - Serenity AI</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body {
      background-color: #000;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      text-align: center;
    }

    h1 {
      color: #0f0;
      text-shadow: 0 0 10px rgba(0, 255, 0, 0.7);
      margin-bottom: 20px;
    }

    .chat-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100%;
      padding: 20px;
    }

    #chat-box {
      width: 80%;
      max-width: 500px;
      height: 350px;
      overflow-y: auto;
      padding: 15px;
      border-radius: 12px;
      background-color: #111;
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      padding: 10px 15px;
      border-radius: 20px;
      max-width: 80%;
      line-height: 1.4;
      word-wrap: break-word;
    }

    .user-msg {
      background-color: #0f0;
      color: #000;
      align-self: flex-end;
      border-bottom-right-radius: 5px;
    }

    .bot-msg {
      background-color: #222;
      color: white;
      align-self: flex-start;
      border-bottom-left-radius: 5px;
    }

    .input-form {
      display: flex;
      padding: 15px;
      margin-top: 15px;
      justify-content: center;
      width: 80%;
      max-width: 500px;
    }

    #prompt-input {
      flex-grow: 1;
      padding: 16px;
      border-radius: 30px;
      background: #222;
      color: white;
      border: 2px solid #0f0;
      font-size: 18px;
      text-align: center;
      outline: none;
      transition: border-color 0.3s ease;
    }

    #prompt-input:focus {
      border-color: #0a0;
    }

    #send-button {
      margin-left: 10px;
      width: 150px;
      background-color: #0f0;
      color: #000;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-size: 18px;
      box-shadow: 0 0 12px rgba(0, 255, 0, 0.7);
      transition: background 0.3s ease;
    }

    #send-button:hover {
      background-color: #0a0;
    }

    #send-button:disabled {
      background-color: #060;
      cursor: not-allowed;
    }

    @media (max-width: 600px) {
      #chat-box {
        height: 300px;
      }
      #prompt-input {
        font-size: 16px;
      }
      #send-button {
        width: 120px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <h1>Serenity AI - Chatbot</h1>
    <img src="D:/serenity_ai_website/images/bot_avatar-Photoroom.png" alt="Chatbot Avatar" class="avatar" style="width:100px; border-radius:50%; margin-bottom:15px;" />
    <div id="chat-box"></div>

    <form id="chat-form" class="input-form">
      <input type="text" id="prompt-input" placeholder="Type your message..." required />
      <button type="submit" id="send-button">Send</button>
    </form>
  </div>

  <script>
    let conversationHistory = [];
    const chatBox = document.getElementById('chat-box');
    const form = document.getElementById('chat-form');
    const input = document.getElementById('prompt-input');
    const sendButton = document.getElementById('send-button');

    function scrollToBottom() {
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function displayMessage(text, sender) {
      const msgDiv = document.createElement('div');
      msgDiv.classList.add('message', sender === 'user' ? 'user-msg' : 'bot-msg');
      msgDiv.innerHTML = `<strong>${sender === 'user' ? 'You' : 'Bot'}:</strong> ${text}`;
      chatBox.appendChild(msgDiv);
      scrollToBottom();
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const prompt = input.value.trim();
      if (!prompt) return;

      displayMessage(prompt, 'user');

      input.value = '';
      sendButton.disabled = true;
      input.disabled = true;

      const data = { prompt: prompt, history: conversationHistory };

      displayMessage('...', 'bot');
      const typingIndicator = chatBox.lastChild;

      try {
        const response = await fetch("https://abandonable-laraine-superdelicate.ngrok-free.dev/api/chat", {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });

        if (!response.ok) throw new Error('Network response was not ok');

        const result = await response.json();
        conversationHistory = result.history;
        chatBox.removeChild(typingIndicator);
        displayMessage(result.reply, 'bot');
      } catch (error) {
        console.error('Fetch error:', error);
        chatBox.removeChild(typingIndicator);
        displayMessage('Sorry, I ran into a communication error!.', 'bot');
      } finally {
        sendButton.disabled = false;
        input.disabled = false;
        input.focus();
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      displayMessage("Hello! I'm Serenity AI, your friendly chatbot. How can I help you today?", 'bot');
    });
  </script>
</body>
</html>
