<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serenity AI - Home</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <nav>
      <a href="index.html">Home</a>
      <a href="login.html">Login</a>
      <a href="signup.html">Signup</a>
    </nav>
  </header>

  <main>
    <section class="home-section">
      <h1>Welcome to Serenity AI</h1>
      <p>Your AI-powered assistant for autism-friendly communication and daily routine management.</p>
      <button onclick="window.location.href='login.html'">Get Started</button>
    </section>
  </main>

  <footer>
    <!-- Footer is now removed as per request -->
  </footer>

  <script src="https://www.gstatic.com/firebasejs/9.1.2/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.1.2/firebase-auth.js"></script>
  <script src="js/firebase-config.js"></script>
  <script>
    firebase.auth().onAuthStateChanged((user) => {
      if (!user) {
        window.location.href = 'login.html'; // Redirect to login if user is not authenticated
      }
    });
  </script>
</body>
</html>
